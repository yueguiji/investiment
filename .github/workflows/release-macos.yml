name: Release macOS Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-fund --no-audit

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS app
        run: |
          wails build -clean -platform darwin/universal

      - name: Prepare release assets
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          release_dir="$PWD/release-assets"

          built_app="$(find "$PWD/build/bin" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$built_app" ]; then
            echo "Built app bundle not found under $PWD/build/bin"
            exit 1
          fi
          app_name="$(basename "$built_app")"

          echo "Using app bundle: $built_app"

          mkdir -p "$release_dir"

          zip_path="$release_dir/investment-platform-$tag-macos-universal.zip"
          tar_path="$release_dir/investment-platform-$tag-macos-universal.tar.gz"

          ditto -c -k --sequesterRsrc --keepParent "$built_app" "$zip_path"
          tar -C "$PWD/build/bin" -czf "$tar_path" "$app_name"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            release-assets/investment-platform-*-macos-universal.zip
            release-assets/investment-platform-*-macos-universal.tar.gz
