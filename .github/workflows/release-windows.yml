name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-fund --no-audit

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          $goBin = Join-Path (go env GOPATH) 'bin'
          Add-Content -Path $env:GITHUB_PATH -Value $goBin

      - name: Build Windows app
        shell: pwsh
        run: |
          wails build -clean

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exeName = "investment-platform.exe"
          $builtExe = Join-Path $PWD "build\bin\$exeName"
          if (-not (Test-Path $builtExe)) {
            throw "Built executable not found: $builtExe"
          }

          $releaseDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $versionedExe = Join-Path $releaseDir "investment-platform-$tag-windows-amd64.exe"
          $zipPath = Join-Path $releaseDir "investment-platform-$tag-windows-amd64.zip"

          Copy-Item -Path $builtExe -Destination $versionedExe -Force
          Compress-Archive -Path $versionedExe -DestinationPath $zipPath -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/investment-platform-*.exe
            release-assets/investment-platform-*.zip
