name: Feature request
description: Suggest an improvement for the public project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What use case is not well supported today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Mention config, compatibility, or migration concerns if relevant.
